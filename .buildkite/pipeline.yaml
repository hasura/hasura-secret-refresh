# Buildkite pipeline for hasura-secret-refresh.
#
# Builds the secrets-management-proxy Docker image and pushes it to
# gcr.io/hasura-ee, following the same convention as hasura/solutions'
# .buildkite/pipeline.yaml — GCP Workload Identity Federation for gcr.io auth
# (no Docker Hub credentials needed).
#
# Immutable tag format: <YYYY>.<M>.<D>-build.<total-commits-in-day>.<short-commit>
#   e.g. 2026.6.24-build.3.1b4f3bf  (pushed on every build, any branch)
# On the main branch a floating :main tag is additionally pushed for the same
# build (metadata-only, via docker buildx imagetools create).
#
# PREREQUISITE (human): this repo is not yet registered as a Buildkite pipeline
# in the hasura Buildkite org. It must be created there and configured to
# trigger on pushes to the main branch.

agents:
  queue: "aws-v3-build-node-common"
steps:
  - label: ":docker: Build and Push secrets-management-proxy"
    key: build-secrets-management-proxy
    retry:
      manual:
        permit_on_passed: true
    command: |
      set -eu -o pipefail

      # Full history is required to count the day's commits for the build number.
      git fetch --unshallow || true

      COMMIT_REF="$(git rev-parse --short=7 HEAD)"
      DATE_VERSION="$(TZ=UTC date +'%Y.%-m.%-d')"
      DATE_DAY="$(TZ=UTC date +'%Y-%m-%d')"
      BUILD_NUM="$(TZ=UTC git log --since="$$DATE_DAY 00:00:00" --until="$$DATE_DAY 23:59:59" --oneline | wc -l | tr -d ' ')"
      VERSION="$$DATE_VERSION-build.$$BUILD_NUM.$$COMMIT_REF"

      echo "~~~ :buildkite: Building secrets-management-proxy with VERSION=$$VERSION"

      echo "~~~ :docker: Configuring docker gcr helper"
      docker-credential-gcr configure-docker --registries=gcr.io

      DOCKER_IMAGE="gcr.io/hasura-ee/secrets-management-proxy:$$VERSION"

      echo "~~~ :docker: Building"
      docker build -t "$$DOCKER_IMAGE" -f ./Dockerfile .

      echo "~~~ :docker: Pushing"
      docker push "$$DOCKER_IMAGE"

      # Only add the floating :main tag on main-branch builds. Note the $$ so
      # BUILDKITE_BRANCH is evaluated by the shell at runtime, NOT interpolated
      # to a literal at pipeline-upload time.
      if [[ "$$BUILDKITE_BRANCH" == 'main' ]]; then
        MAIN_TAG="gcr.io/hasura-ee/secrets-management-proxy:main"
        echo "~~~ :docker: Adding floating :main tag"
        docker buildx imagetools create -t "$$MAIN_TAG" "$$DOCKER_IMAGE"
      fi

      echo "~~~ :docker: Removing local image"
      docker image rm "$$DOCKER_IMAGE" || true
    env:
      DOCKER_BUILDKIT: "1"
    plugins:
      - hasura/smooth-secrets#v1.3.2:
          secrets:
            - strategy: aws-secrets-manager
              key: github-user-keys/hasura-ci
              type: ssh
              region: us-east-2
      - gcp-workload-identity-federation#v1.5.0:
          audience: "//iam.googleapis.com/projects/1025009031284/locations/global/workloadIdentityPools/hasura-ddn/providers/buildkite"
          service-account: "hasura-ci-docker-writer@hasura-ddn.iam.gserviceaccount.com"
          lifetime: 3600
      - hasura/smooth-checkout#v4.3.2:
          repos:
            - config:
                - url: git@github.com:hasura/hasura-secret-refresh.git
          delete_checkout: true
          interpolate_checkout_path: "$BUILDKITE_BUILD_CHECKOUT_PATH/$BUILDKITE_BUILD_ID/$BUILDKITE_JOB_ID"
