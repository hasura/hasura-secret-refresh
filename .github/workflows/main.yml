name: Build and push docker image

on:
  push:
    branches:
      - main
    tags:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the day's commit ordinal can be computed for the tag.
          fetch-depth: 0
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Compute image tags
        id: tags
        run: |
          # On a git tag push, keep publishing the immutable :<tagname> image.
          # On a main-branch push, publish an immutable
          # :<yyyy-mm-dd>-<short-commit>-<ordinal> image (ordinal = 1-based count
          # of this branch's commits dated on the same UTC day, incl. this one)
          # plus the floating :main alias pointing at that same build.
          {
            echo "tags<<EOF"
            if [ "${{ github.ref_type }}" = "tag" ]; then
              echo "hasura/secrets-management-proxy:${{ github.ref_name }}"
            else
              DATE="$(date -u +'%Y-%m-%d')"
              COUNT="$(TZ=UTC git log --since="${DATE}T00:00:00" --until="${DATE}T23:59:59" --oneline | wc -l | tr -d ' ')"
              echo "hasura/secrets-management-proxy:${DATE}-${GITHUB_SHA::7}-${COUNT}"
              echo "hasura/secrets-management-proxy:main"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      -
        name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
